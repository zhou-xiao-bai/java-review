server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: java-review
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/java_review}
    username: ${DATABASE_USERNAME:java_review}
    password: ${DATABASE_PASSWORD:java_review}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    remember-me:
      key: ${REMEMBER_ME_KEY:java-review-dev-remember-me}
      token-validity-seconds: ${REMEMBER_ME_SECONDS:1209600}
