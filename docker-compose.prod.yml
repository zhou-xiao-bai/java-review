services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-java_review}
      POSTGRES_USER: ${POSTGRES_USER:-java_review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-java_review}
      DATABASE_USERNAME: ${POSTGRES_USER:-java_review}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REMEMBER_ME_KEY: ${REMEMBER_ME_KEY:?REMEMBER_ME_KEY is required}
      REMEMBER_ME_SECONDS: ${REMEMBER_ME_SECONDS:-1209600}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8088}:80"

volumes:
  postgres-data:
