services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: java-review-postgres
    environment:
      POSTGRES_DB: java_review
      POSTGRES_USER: java_review
      POSTGRES_PASSWORD: java_review
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U java_review -d java_review"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
